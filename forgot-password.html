<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password – Bennett University</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">
  <a href="index.html" class="auth-back">&larr; Back to home</a>

  <div class="auth-wrap">
    <div class="auth-badge">Reset password</div>
    <h1 class="auth-title">Forgot your password?</h1>
    <p class="auth-subtitle">Enter your email and we'll send you a link to reset it.</p>

    <div class="auth-card">
      <form class="auth-form" data-action="forgot">
        <div class="form-row">
          <label for="forgot-email">Email Address</label>
          <input type="email" id="forgot-email" name="email" required placeholder="your@email.com" />
        </div>
        <button type="submit" class="auth-btn-primary">Send reset link</button>
      </form>
    </div>

    <p class="auth-switch"><a href="login.html">&larr; Back to login</a></p>
  </div>

  <script src="auth.js"></script>
</body>
</html>
