<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile – Bennett University</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="profile.css" />
</head>
<body class="profile-page">
  <div id="root"></div>

  <!-- React and Babel via CDN so this single HTML file becomes a React page -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const API_PORT = '3000';

    function getApiUrl(path) {
      const port = window.location.port;
      const isFile = window.location.protocol === 'file:';
      const needRemote = isFile || !port || port !== API_PORT || !window.location.hostname;
      const base = needRemote ? 'http://localhost:' + API_PORT : '';
      return (base + '/api' + path).replace(/([^:]\/)\/+/g, '$1');
    }

    function getToken() {
      return localStorage.getItem('auth_token');
    }

    function clearAuth() {
      localStorage.removeItem('auth_token');
      localStorage.removeItem('auth_user');
      window.location.href = 'login.html';
    }

    function authHeaders() {
      const token = getToken();
      return {
        'Content-Type': 'application/json',
        Authorization: token ? 'Bearer ' + token : '',
      };
    }

    const TIMESLOTS = [
      '6:00–7:00 pm',
      '7:00–8:00 pm',
      '8:00–9:00 pm',
      '9:00–10:00 pm',
      '10:00–11:00 pm',
      '5:00–6:00 pm',
    ];

    function ProfilePage() {
      const [email, setEmail] = useState('');
      const [about, setAbout] = useState('');
      const [fullName, setFullName] = useState('');
      const [benchpress, setBenchpress] = useState('');
      const [dumbbell, setDumbbell] = useState('');
      const [progressNotes, setProgressNotes] = useState('');
      const [myTimeslot, setMyTimeslot] = useState('');
      const [profileRole, setProfileRole] = useState('member');
      const [leaderboardPosition, setLeaderboardPosition] = useState('');
      const [avatar, setAvatar] = useState('');
      const [pendingAvatar, setPendingAvatar] = useState(null);
      const [status, setStatus] = useState('');
      const [statusType, setStatusType] = useState('');
      const [loading, setLoading] = useState(true);
      const [timeslotStats, setTimeslotStats] = useState({});
      const [timeslotBusy, setTimeslotBusy] = useState(false);

      // Redirect if not logged in
      useEffect(() => {
        if (!getToken()) {
          clearAuth();
        }
      }, []);

      // Load profile data
      useEffect(() => {
        async function loadProfile() {
          try {
            const res = await fetch(getApiUrl('/profile'), { headers: authHeaders() });
            if (res.status === 401) {
              clearAuth();
              return;
            }
            const data = await res.json();
            if (!data.success) {
              setLoading(false);
              return;
            }
            const user = data.user || {};
            const profile = data.profile || {};

            if (user.email) setEmail(user.email);
            if (profile.about) setAbout(profile.about);
            if (profile.full_name) setFullName(profile.full_name);
            if (profile.benchpress_pr) setBenchpress(profile.benchpress_pr);
            if (profile.dumbbell_pr) setDumbbell(profile.dumbbell_pr);
            if (profile.progress_notes) setProgressNotes(profile.progress_notes);
            if (profile.my_timeslot) setMyTimeslot(profile.my_timeslot);

            if (profile.leaderboard_position != null && profile.leaderboard_position > 0) {
              setLeaderboardPosition(String(profile.leaderboard_position));
            }

            if (profile.avatar) {
              setAvatar(profile.avatar);
            }

            if (profile.role) {
              setProfileRole(profile.role);
            }
          } catch (err) {
            console.error(err);
          } finally {
            setLoading(false);
          }
        }

        loadProfile();
      }, []);

      function handleAvatarChange(e) {
        const file = e.target.files[0];
        if (!file || !file.type.startsWith('image/')) return;

        const reader = new FileReader();
        reader.onload = () => {
          const dataUrl = reader.result;
          const img = new Image();
          img.onload = function () {
            const canvas = document.createElement('canvas');
            const size = Math.min(400, img.width, img.height);
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, size, size);
            const resized = canvas.toDataURL('image/jpeg', 0.8);
            setAvatar(resized);
            setPendingAvatar(resized);
          };
          img.src = dataUrl;
        };
        reader.readAsDataURL(file);
      }

      async function handleSave() {
        setStatus('Saving...');
        setStatusType('');

        const payload = {
          about,
          full_name: fullName,
          benchpress_pr: benchpress,
          dumbbell_pr: dumbbell,
          progress_notes: progressNotes,
          my_timeslot: myTimeslot,
          role: profileRole,
          leaderboard_position: parseInt(leaderboardPosition, 10) || 0,
        };

        if (pendingAvatar) {
          payload.avatar = pendingAvatar;
        }

        try {
          const res = await fetch(getApiUrl('/profile'), {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify(payload),
          });
          const data = await res.json();

          if (res.status === 401) {
            clearAuth();
            return;
          }

          if (data.success) {
            setStatus('Saved!');
            setStatusType('success');
            setPendingAvatar(null);
            setTimeout(() => setStatus(''), 2000);
          } else {
            setStatus(data.message || 'Failed to save');
            setStatusType('error');
          }
        } catch (err) {
          console.error(err);
          setStatus('Network error');
          setStatusType('error');
        }
      }

      async function loadTimeslots() {
        try {
          const res = await fetch(getApiUrl('/timeslots'), { headers: authHeaders() });
          if (!res.ok) return;
          const data = await res.json();
          if (!data.success) return;

          const map = {};
          (data.slots || []).forEach((s) => {
            map[s.slot] = s;
          });
          setTimeslotStats(map);
        } catch (err) {
          // Ignore polling errors to keep the UI responsive
          console.error(err);
        }
      }

      useEffect(() => {
        // Load + keep slot availability updated for dynamic "full slot" behavior.
        loadTimeslots();
        const timer = setInterval(loadTimeslots, 8000);
        return () => clearInterval(timer);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      async function reserveTimeslot(slot) {
        if (!slot || slot === myTimeslot) return;
        const stats = timeslotStats[slot];
        const disabled = stats && stats.full;
        if (disabled) {
          setStatus('This timeslot is full. Choose another one.');
          setStatusType('error');
          return;
        }

        setTimeslotBusy(true);
        setStatus('Reserving timeslot...');
        setStatusType('');

        try {
          const res = await fetch(getApiUrl('/profile/timeslot'), {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({ my_timeslot: slot }),
          });
          const data = await res.json().catch(() => ({}));

          if (res.status === 401) {
            clearAuth();
            return;
          }

          if (!res.ok || !data.success) {
            setStatus(data.message || 'Failed to reserve timeslot');
            setStatusType('error');
            // Refresh availability right away if someone filled it before us
            await loadTimeslots();
            return;
          }

          setMyTimeslot(slot);
          setStatus('Timeslot updated!');
          setStatusType('success');
          await loadTimeslots();
          setTimeout(() => setStatus(''), 1800);
        } catch (err) {
          console.error(err);
          setStatus('Network error while reserving timeslot');
          setStatusType('error');
        } finally {
          setTimeslotBusy(false);
        }
      }

      const leaderboardDisplay =
        parseInt(leaderboardPosition, 10) > 0 ? '#' + parseInt(leaderboardPosition, 10) : '—';

      return (
        <>
          <header className="profile-header">
            <div className="profile-header-inner">
              <a href="index.html" className="profile-logo">
                BENNETT-UNIVERSITY OFFICIAL
              </a>
              <nav className="profile-nav">
                <a href="index.html">Home</a>
                <a href="discover.html">Discover</a>
                <a href="leaderboard.html">Leaderboard</a>
                <span className="profile-email">{email}</span>
                <a
                  href="#"
                  onClick={(e) => {
                    e.preventDefault();
                    clearAuth();
                  }}
                  id="logout-link"
                >
                  Logout
                </a>
              </nav>
            </div>
          </header>

          <main className="profile-main">
            <div className="profile-container">
              {loading && <p>Loading profile...</p>}

              {!loading && (
                <>
                  <section className="profile-top animate-in">
                    <div className="profile-avatar-wrap">
                      <div className={'profile-avatar' + (avatar ? ' has-image' : '')}>
                        {avatar ? (
                          <img src={avatar} alt="Profile" />
                        ) : (
                          <span className="avatar-placeholder">+</span>
                        )}
                      </div>
                      <label className="avatar-edit" htmlFor="avatar-input">
                        edit
                      </label>
                      <input
                        type="file"
                        id="avatar-input"
                        accept="image/*"
                        hidden
                        onChange={handleAvatarChange}
                      />
                    </div>
                    <div className="profile-about-card">
                      <h2>about you</h2>
                      <textarea
                        value={about}
                        onChange={(e) => setAbout(e.target.value)}
                        placeholder="Tell us about yourself, your goals, and what drives you..."
                      />
                      <div className="profile-name-row">
                        <label htmlFor="full-name">Full name</label>
                        <input
                          type="text"
                          id="full-name"
                          placeholder="Your name"
                          value={fullName}
                          onChange={(e) => setFullName(e.target.value)}
                        />
                      </div>
                    </div>
                  </section>

                  <div className="profile-divider animate-in" style={{ animationDelay: '0.1s' }}></div>

                  <section className="profile-timeslots animate-in" style={{ animationDelay: '0.15s' }}>
                    <div className="profile-card">
                      <h3>My timeslot</h3>
                      <p className="card-subtitle">
                        Choose one 1-hour session (gym closes at 11 pm).
                      </p>
                      <div className="timeslot-pills">
                        {TIMESLOTS.map((slot) => {
                          const stats = timeslotStats[slot];
                          const isSelected = myTimeslot === slot;
                          const isFull = !!stats && stats.full;
                          const isDisabled = !isSelected && isFull;
                          const seatText = stats
                            ? stats.full
                              ? 'Full'
                              : `${stats.remaining} left`
                            : '';

                          return (
                            <button
                              key={slot}
                              type="button"
                              disabled={timeslotBusy || isDisabled}
                              className={
                                'timeslot-pill' +
                                (isSelected ? ' timeslot-pill--selected' : '') +
                                (isDisabled ? ' timeslot-pill--disabled' : '')
                              }
                              onClick={() => reserveTimeslot(slot)}
                              title={stats ? `${seatText} (Capacity: ${stats.capacity})` : 'Choose slot'}
                            >
                              <span className="timeslot-pill-text">{slot}</span>
                              {seatText && (
                                <span
                                  className={
                                    'timeslot-pill-seat' +
                                    (stats && stats.full ? ' timeslot-pill-seat--full' : '')
                                  }
                                >
                                  {seatText}
                                </span>
                              )}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                    <div className="profile-card">
                      <h3>All available timeslots</h3>
                      <p className="card-subtitle">
                        Slots are fixed to keep the gym organised. You can switch anytime by picking a
                        different slot above.
                      </p>
                      <div className="timeslot-pills">
                        {TIMESLOTS.map((slot) => {
                          const stats = timeslotStats[slot];
                          const isSelected = myTimeslot === slot;
                          const isFull = !!stats && stats.full;
                          const seatText = stats
                            ? stats.full
                              ? 'Full'
                              : `${stats.remaining} left`
                            : '';

                          return (
                            <span
                              key={slot}
                              className={
                                'timeslot-pill' +
                                (isSelected ? ' timeslot-pill--selected' : '') +
                                (isFull ? ' timeslot-pill--disabled' : '')
                              }
                              title={stats ? `${seatText} (Capacity: ${stats.capacity})` : 'Slot'}
                            >
                              <span className="timeslot-pill-text">{slot}</span>
                              {seatText && (
                                <span
                                  className={
                                    'timeslot-pill-seat' +
                                    (stats && stats.full ? ' timeslot-pill-seat--full' : '')
                                  }
                                >
                                  {seatText}
                                </span>
                              )}
                            </span>
                          );
                        })}
                      </div>
                    </div>
                  </section>

                  <section className="profile-progress animate-in" style={{ animationDelay: '0.2s' }}>
                    <div className="profile-card profile-card--wide">
                      <h3>Progress &amp; PRs</h3>
                      <p className="card-subtitle">Bench press, dumbbell, and more</p>
                      <div className="profile-role-block">
                        <h4 className="role-heading">I’m a...</h4>
                        <div className="role-toggle">
                          <button
                            type="button"
                            className={
                              'role-pill' + (profileRole === 'trainer' ? ' role-pill--selected' : '')
                            }
                            onClick={() => setProfileRole('trainer')}
                          >
                            Trainer
                          </button>
                          <button
                            type="button"
                            className={
                              'role-pill' + (profileRole !== 'trainer' ? ' role-pill--selected' : '')
                            }
                            onClick={() => setProfileRole('member')}
                          >
                            Just training
                          </button>
                        </div>
                        <p className="role-help">
                          Trainers can run sessions. Members can train and improve their PRs.
                        </p>
                      </div>
                      <div className="progress-grid">
                        <div className="progress-field">
                          <label htmlFor="benchpress">Bench press (kg)</label>
                          <input
                            type="text"
                            id="benchpress"
                            placeholder="e.g. 80"
                            value={benchpress}
                            onChange={(e) => setBenchpress(e.target.value)}
                          />
                        </div>
                        <div className="progress-field">
                          <label htmlFor="dumbbell">Dumbbell (kg)</label>
                          <input
                            type="text"
                            id="dumbbell"
                            placeholder="e.g. 25"
                            value={dumbbell}
                            onChange={(e) => setDumbbell(e.target.value)}
                          />
                        </div>
                      </div>
                      <div className="progress-field progress-field--full">
                        <label htmlFor="progress-notes">Progress notes</label>
                        <textarea
                          id="progress-notes"
                          rows="3"
                          placeholder="Track your journey, milestones, and goals..."
                          value={progressNotes}
                          onChange={(e) => setProgressNotes(e.target.value)}
                        />
                      </div>
                    </div>
                  </section>

                  <section className="profile-leaderboard animate-in" style={{ animationDelay: '0.25s' }}>
                    <div className="profile-card profile-card--accent">
                      <h3>My position on the leaderboard</h3>
                      <p className="leaderboard-value" id="leaderboard-position">
                        {leaderboardDisplay}
                      </p>
                      <p className="card-subtitle">
                        Rank is calculated automatically based on your performance and consistency.
                      </p>
                    </div>
                  </section>

                  <div className="profile-actions animate-in" style={{ animationDelay: '0.3s' }}>
                    <button
                      type="button"
                      className="profile-save-btn"
                      onClick={handleSave}
                      disabled={loading}
                    >
                      Save profile
                    </button>
                    <span className={`save-status${statusType ? ' ' + statusType : ''}`}>{status}</span>
                  </div>
                </>
              )}
            </div>
          </main>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ProfilePage />);
  </script>
</body>
</html>
