<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up – Bennett University</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    const API_PORT = '3000';

    function getApiUrl(path) {
      const port = window.location.port;
      const isFile = window.location.protocol === 'file:';
      const needRemote = isFile || !port || port !== API_PORT || !window.location.hostname;
      const base = needRemote ? 'http://localhost:' + API_PORT : '';
      return (base + '/api' + path).replace(/([^:]\/)\/+/g, '$1');
    }

    function SignupPage() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [confirm, setConfirm] = useState('');
      const [terms, setTerms] = useState(false);
      const [message, setMessage] = useState('');
      const [isError, setIsError] = useState(false);
      const [loading, setLoading] = useState(false);

      const passwordsMatch = !confirm || password === confirm;

      async function handleSubmit(e) {
        e.preventDefault();
        if (!passwordsMatch) {
          setMessage('Passwords do not match');
          setIsError(true);
          return;
        }
        if (!terms) {
          setMessage('You must agree to the terms and conditions');
          setIsError(true);
          return;
        }

        setLoading(true);
        setMessage('');
        setIsError(false);

        try {
          const res = await fetch(getApiUrl('/signup'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();

          if (data.success) {
            if (data.token) {
              localStorage.setItem('auth_token', data.token);
              if (data.user) {
                localStorage.setItem('auth_user', JSON.stringify(data.user));
              }
              setMessage('Account created! Redirecting to profile...');
              setIsError(false);
              const profileUrl =
                window.location.protocol === 'file:'
                  ? 'profile.html'
                  : window.location.origin + '/profile.html';
              window.location.replace(profileUrl);
            } else {
              setMessage(data.message || 'Account created! Redirecting to login...');
              setIsError(false);
              setTimeout(() => {
                window.location.href = 'login.html';
              }, 1200);
            }
          } else {
            setMessage(data.message || 'Signup failed');
            setIsError(true);
            setLoading(false);
          }
        } catch (err) {
          console.error(err);
          setMessage('Network error. Make sure the server is running (npm start).');
          setIsError(true);
          setLoading(false);
        }
      }

      function handleGoogleClick(e) {
        e.preventDefault();
        // Demo Google signup/login: immediately create a demo Google user session
        const demoUser = {
          id: 'google-demo',
          email: 'google.user@example.com',
          name: 'Google Demo User',
          provider: 'google',
        };
        localStorage.setItem('auth_token', 'google-demo-token');
        localStorage.setItem('auth_user', JSON.stringify(demoUser));
        setMessage('Signed in with Google demo account.');
        setIsError(false);
        const profileUrl =
          window.location.protocol === 'file:'
            ? 'profile.html'
            : window.location.origin + '/profile.html';
        window.location.replace(profileUrl);
      }

      return (
        <>
          <a href="index.html" className="auth-back">
            &larr; Back to home
          </a>

          <div className="auth-wrap">
            {message && (
              <p
                className={
                  'auth-message' + (isError ? ' auth-message--error' : ' auth-message--success')
                }
              >
                {message}
              </p>
            )}

            <div className="auth-badge">Gymrat Signup</div>
            <h1 className="auth-title">Create your account</h1>

            <div className="auth-card">
              <form className="auth-form" onSubmit={handleSubmit}>
                <div className="form-row">
                  <label htmlFor="signup-email">Email Address</label>
                  <input
                    type="email"
                    id="signup-email"
                    name="email"
                    required
                    placeholder="your@email.com"
                    value={email}
                    onChange={(e) => setEmail(e.target.value)}
                  />
                </div>
                <div className="form-row">
                  <label htmlFor="signup-password">Password</label>
                  <input
                    type="password"
                    id="signup-password"
                    name="password"
                    required
                    minLength={6}
                    placeholder="••••••••"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                  />
                </div>
                <div className="form-row">
                  <label htmlFor="signup-confirm">Confirm Password</label>
                  <input
                    type="password"
                    id="signup-confirm"
                    name="confirm"
                    required
                    minLength={6}
                    placeholder="••••••••"
                    value={confirm}
                    onChange={(e) => setConfirm(e.target.value)}
                  />
                  {!passwordsMatch && (
                    <small style={{ color: '#ff4d4f', marginTop: '0.25rem', display: 'block' }}>
                      Passwords do not match
                    </small>
                  )}
                </div>
                <div style={{ marginTop: '1rem', marginBottom: '1.5rem' }}>
                  <label className="auth-checkbox">
                    <input
                      type="checkbox"
                      name="terms"
                      required
                      checked={terms}
                      onChange={(e) => setTerms(e.target.checked)}
                    />
                    <span>I agree to the terms and conditions</span>
                  </label>
                </div>
                <button type="submit" className="auth-btn-primary" disabled={loading}>
                  {loading ? 'Please wait...' : 'Create an Account'}
                </button>
              </form>

              <p className="auth-divider">or</p>

              <a
                href="#"
                className="auth-google"
                id="google-signup"
                role="button"
                onClick={handleGoogleClick}
              >
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path
                    fill="#4285F4"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                  />
                  <path
                    fill="#34A853"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  />
                  <path
                    fill="#FBBC05"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                  />
                  <path
                    fill="#EA4335"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  />
                </svg>
                Continue with Google
              </a>
            </div>

            <p className="auth-switch">
              Already have an account? <a href="login.html">Log in</a>
            </p>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SignupPage />);
  </script>
</body>
</html>
