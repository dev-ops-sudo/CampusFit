<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discover – CampusFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="profile.css" />
</head>
<body class="profile-page discover-page">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const API_PORT = '3000';

    function getApiUrl(path) {
      const port = window.location.port;
      const isFile = window.location.protocol === 'file:';
      const needRemote = isFile || !port || port !== API_PORT || !window.location.hostname;
      const base = needRemote ? 'http://localhost:' + API_PORT : '';
      return (base + '/api' + path).replace(/([^:]\/)\/+/g, '$1');
    }

    function getToken() {
      return localStorage.getItem('auth_token');
    }

    function clearAuth() {
      localStorage.removeItem('auth_token');
      localStorage.removeItem('auth_user');
      window.location.href = 'login.html';
    }

    function authHeaders() {
      const token = getToken();
      return {
        'Content-Type': 'application/json',
        Authorization: token ? 'Bearer ' + token : '',
      };
    }

    function DiscoverPage() {
      const [query, setQuery] = useState('');
      const [users, setUsers] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      useEffect(() => {
        if (!getToken()) {
          clearAuth();
        }
      }, []);

      const runSearch = useCallback(
        async (q) => {
          const t = String(q || '').trim();
          if (t.length < 2) {
            setUsers([]);
            setError('');
            return;
          }
          setLoading(true);
          setError('');
          try {
            const res = await fetch(
              getApiUrl('/users/search?q=' + encodeURIComponent(t)),
              { headers: authHeaders() }
            );
            if (res.status === 401) {
              clearAuth();
              return;
            }
            const data = await res.json();
            if (!data.success) {
              setError(data.message || 'Search failed');
              setUsers([]);
              return;
            }
            setUsers(data.users || []);
          } catch (e) {
            console.error(e);
            setError('Network error');
            setUsers([]);
          } finally {
            setLoading(false);
          }
        },
        []
      );

      useEffect(() => {
        const id = setTimeout(() => runSearch(query), 320);
        return () => clearTimeout(id);
      }, [query, runSearch]);

      return (
        <>
          <header className="profile-header discover-header">
            <div className="profile-header-inner">
              <a href="profile.html" className="discover-back" aria-label="Back">
                ←
              </a>
              <h1 className="discover-title">Discover</h1>
              <span className="discover-spacer" />
            </div>
          </header>

          <main className="profile-main discover-main">
            <div className="profile-container discover-container">
              <div className="discover-search-wrap profile-card">
                <label className="discover-label" htmlFor="discover-q">
                  Search members
                </label>
                <input
                  id="discover-q"
                  className="discover-input"
                  type="search"
                  placeholder="Name or email…"
                  value={query}
                  onChange={(e) => setQuery(e.target.value)}
                  autoComplete="off"
                />
                <p className="discover-hint">Type at least 2 characters. Your email stays private.</p>
              </div>

              {error && <p className="discover-error">{error}</p>}
              {loading && query.trim().length >= 2 && (
                <p className="discover-muted">Searching…</p>
              )}

              {!loading && query.trim().length >= 2 && users.length === 0 && !error && (
                <p className="discover-muted">No members found.</p>
              )}

              <ul className="discover-list">
                {users.map((u) => (
                  <li key={u.id}>
                    <a href={'user.html?id=' + u.id} className="discover-row profile-card">
                      <div className={'discover-avatar' + (u.avatar ? ' has-image' : '')}>
                        {u.avatar ? (
                          <img src={u.avatar} alt="" />
                        ) : (
                          <span className="discover-avatar-placeholder">
                            {(u.display_name || '?').charAt(0).toUpperCase()}
                          </span>
                        )}
                      </div>
                      <div className="discover-row-text">
                        <span className="discover-name">{u.display_name}</span>
                        <span
                          className={
                            'discover-badge' +
                            (u.role === 'trainer' ? ' discover-badge--trainer' : '')
                          }
                        >
                          {u.role === 'trainer' ? 'Trainer' : 'Member'}
                        </span>
                      </div>
                      <span className="discover-chevron">›</span>
                    </a>
                  </li>
                ))}
              </ul>
            </div>
          </main>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DiscoverPage />);
  </script>
</body>
</html>
