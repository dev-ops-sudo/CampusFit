<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusFit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM + Babel for this single-page React experience -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const API_PORT = '3000';

    function getApiUrl(path) {
      const port = window.location.port;
      const isFile = window.location.protocol === 'file:';
      const needRemote = isFile || !port || port !== API_PORT || !window.location.hostname;
      const base = needRemote ? 'http://localhost:' + API_PORT : '';
      return (base + '/api' + path).replace(/([^:]\/)\/+/g, '$1');
    }

    function isLoggedIn() {
      return !!localStorage.getItem('auth_token');
    }

    function MiniLeaderboard() {
      const [entries, setEntries] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');

      useEffect(() => {
        async function load() {
          try {
            const res = await fetch(getApiUrl('/leaderboard-advanced'));
            if (!res.ok) throw new Error('Failed to load leaderboard');
            const data = await res.json();
            if (!data.success) throw new Error(data.message || 'Failed to load leaderboard');
            setEntries((data.data || []).slice(0, 5));
          } catch (err) {
            console.error(err);
            setError('Leaderboard unavailable');
          } finally {
            setLoading(false);
          }
        }
        load();
      }, []);

      return (
        <div className="mini-leaderboard-card">
          <div className="mini-leaderboard-header">
            <div>
              <div className="mini-leaderboard-title">Social</div>
              <h3 style={{ margin: '0.25rem 0 0', fontFamily: 'Syne, sans-serif' }}>Leaderboard</h3>
            </div>
            {!loading && !error && entries.length > 0 && (
              <div className="mini-leaderboard-subtitle">
                Live top {entries.length} gymrats
              </div>
            )}
          </div>

          {loading && <p className="mini-leaderboard-subtitle">Loading...</p>}
          {error && !loading && <p className="mini-leaderboard-subtitle">{error}</p>}

          {!loading && !error && entries.length > 0 && (
            <div className="mini-leaderboard-bars">
              {entries.map((row, idx) => {
                const maxScore = entries[0].total_score || 1;
                const height =
                  maxScore > 0 ? Math.max(15, (row.total_score / maxScore) * 100) : 20;
                return (
                  <div className="mini-bar" key={row.user_id}>
                    <div className="mini-bar-score">{row.total_score?.toFixed(0)}</div>
                    <div
                      className="mini-bar-rect"
                      style={{ height: `${height}%` }}
                      title={`${row.name} – ${row.total_score?.toFixed(1)}`}
                    ></div>
                    <div className="mini-bar-name">{row.name.split(' ')[0]}</div>
                  </div>
                );
              })}
            </div>
          )}

          <div className="mini-leaderboard-footer">
            <span>Updated when you refresh.</span>
            <span className="mini-leaderboard-chip">Top performers</span>
          </div>
        </div>
      );
    }

    function HomePage() {
      const [loggedIn, setLoggedIn] = useState(isLoggedIn());
      const [menuOpen, setMenuOpen] = useState(false);
      const [headerSolid, setHeaderSolid] = useState(false);
      const [feedbackMessage, setFeedbackMessage] = useState('');
      const [feedbackError, setFeedbackError] = useState(false);
      const [feedbackLoading, setFeedbackLoading] = useState(false);

      useEffect(() => {
        function onScroll() {
          setHeaderSolid(window.scrollY > 50);
        }
        window.addEventListener('scroll', onScroll);
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      async function handleContactSubmit(e) {
        e.preventDefault();
        const form = e.target;
        const name = form.name.value;
        const email = form.email.value;
        const message = form.message.value;

        setFeedbackLoading(true);
        setFeedbackMessage('');
        setFeedbackError(false);

        try {
          const res = await fetch(getApiUrl('/feedback'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, message }),
          });
          const data = await res.json();
          if (data.success) {
            setFeedbackMessage(data.message || "Thanks for your message! We'll get back to you soon.");
            setFeedbackError(false);
            form.reset();
          } else {
            setFeedbackMessage(data.message || 'Failed to send feedback.');
            setFeedbackError(true);
          }
        } catch (err) {
          console.error(err);
          setFeedbackMessage('Network error. Please try again later.');
          setFeedbackError(true);
        }
        setFeedbackLoading(false);
      }

      return (
        <>
          <header className={'header' + (headerSolid ? ' header--solid' : '')}>
            <div className="container header-inner">
              <a href="#" className="logo">
                BENNETT-UNIVERSITY OFFICIAL
              </a>
              <nav className="nav">
                {loggedIn && (
                  <>
                    <a href="profile.html" id="nav-profile">
                      Profile
                    </a>
                    <a href="leaderboard.html" id="nav-leaderboard">
                      Leaderboard
                    </a>
                  </>
                )}
                {!loggedIn && (
                  <>
                    <a href="login.html" id="nav-login">
                      Login
                    </a>
                    <a href="signup.html" id="nav-signup">
                      Signup
                    </a>
                  </>
                )}
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
                <button
                  className="menu-btn"
                  aria-label="Toggle menu"
                  aria-expanded={menuOpen}
                  onClick={() => {
                    const next = !menuOpen;
                    setMenuOpen(next);
                    document.body.style.overflow = next ? 'hidden' : '';
                  }}
                >
                  <span></span>
                  <span></span>
                  <span></span>
                </button>
              </nav>
            </div>
            <nav className={'nav-mobile' + (menuOpen ? ' is-open' : '')}>
              <a
                href="#work"
                onClick={() => {
                  setMenuOpen(false);
                  document.body.style.overflow = '';
                }}
              >
                Work
              </a>
              <a
                href="#services"
                onClick={() => {
                  setMenuOpen(false);
                  document.body.style.overflow = '';
                }}
              >
                Services
              </a>
              <a
                href="#about"
                onClick={() => {
                  setMenuOpen(false);
                  document.body.style.overflow = '';
                }}
              >
                About
              </a>
              <a
                href="#contact"
                onClick={() => {
                  setMenuOpen(false);
                  document.body.style.overflow = '';
                }}
              >
                Contact
              </a>
            </nav>
          </header>

          <main>
            <section className="hero">
              <div className="hero-bg">
                <img src="background img.webp" alt="" />
              </div>
              <div className="container hero-content">
                <p className="hero-label">Bennett University</p>
                <h1 className="hero-title">
                  READY TO CRUSH
                  <br />
                  GYMRAT?.
                </h1>
                <p className="hero-desc">VENI VEDI VICI</p>
                <a href="#work" className="btn btn-primary">
                  View our work
                </a>
              </div>
              <div className="hero-scroll">
                <span>Scroll</span>
                <div className="scroll-line"></div>
              </div>
            </section>

            <section id="work" className="section work">
              <div className="container">
                <h2 className="section-title">Our work</h2>
                <div className="grid gallery">
                  <a href="#" className="gallery-item gallery-item--large">
                    <img src="gym pic.jpg" alt="Project 1" />
                    <div className="gallery-overlay">
                      <span className="gallery-cat">Branding</span>
                      <span className="gallery-name">Our GYM</span>
                    </div>
                  </a>
                  <a href="#" className="gallery-item">
                    <img src="GYM1.jpg" alt="Project 2" />
                    <div className="gallery-overlay">
                      <span className="gallery-cat">Exercise</span>
                      <span className="gallery-name">Cardio Section</span>
                    </div>
                  </a>
                  <a href="#" className="gallery-item">
                    <img src="motivation.jpg" alt="Project 3" />
                    <div className="gallery-overlay">
                      <span className="gallery-cat">our focus</span>
                      <span className="gallery-name">Motivation</span>
                    </div>
                  </a>
                  <a href="#" className="gallery-item">
                    <img src="gym2.jpg" alt="Project 4" />
                    <div className="gallery-overlay">
                      <span className="gallery-cat">Campaign</span>
                      <span className="gallery-name">Muscle building</span>
                    </div>
                  </a>
                  <div className="gallery-item">
                    <MiniLeaderboard />
                  </div>
                </div>
              </div>
            </section>

            <section id="services" className="section services">
              <div className="container">
                <h2 className="section-title">What we do</h2>
                <div className="services-grid">
                  <article className="service-card">
                    <h3>Provide Timeslots</h3>
                    <p>
                      We provide a specific time slot for everyone which reduces the chaos and provide easy
                      acess to equipments.
                    </p>
                  </article>
                  <article className="service-card">
                    <h3>Creating Commutnity</h3>
                    <p>
                      Compete with your colleagues and be on the top.A place where u can share your story,
                      help other or create a poll if u want everyone to notice something.
                    </p>
                  </article>
                  <article className="service-card">
                    <h3>Leaderboard</h3>
                    <p>Compete with your colleagues and be on the top.</p>
                  </article>
                </div>
              </div>
            </section>

            <section id="about" className="section about">
              <div className="container about-inner">
                <div className="about-image">
                  <img src="community.png" alt="Our team" />
                </div>
                <div className="about-content">
                  <h2 className="section-title">We're Campus Fit</h2>
                  <p>Building Connections</p>
                  <p className="about-lead">
                    An official website focused on visual storytelling for our gym that want to stand out.
                  </p>
                  <p>
                    We combine strategy, competition, and motivation to create work that resonates. From
                    identity to campaign, we're with you from start to end.
                  </p>
                  <a href="#contact" className="btn btn-outline">
                    Share your feedback
                  </a>
                </div>
              </div>
            </section>

            <section id="contact" className="section contact">
              <div className="container">
                <h2 className="section-title">Let's work together</h2>
                <p className="contact-lead">
                  Have a thought in mind? Share with us to help us improve.
                </p>
                {feedbackMessage && (
                  <p
                    style={{
                      marginBottom: '1rem',
                      color: feedbackError ? '#ff4d4f' : '#4caf50',
                      fontSize: '0.95rem',
                    }}
                  >
                    {feedbackMessage}
                  </p>
                )}
                <form className="contact-form" onSubmit={handleContactSubmit}>
                  <div className="form-row">
                    <label htmlFor="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="Your name" />
                  </div>
                  <div className="form-row">
                    <label htmlFor="email">Email</label>
                    <input
                      type="email"
                      id="email"
                      name="email"
                      required
                      placeholder="you@company.com"
                    />
                  </div>
                  <div className="form-row">
                    <label htmlFor="message">Message</label>
                    <textarea
                      id="message"
                      name="message"
                      rows="4"
                      required
                      placeholder="Tell us about your thoughts"
                    ></textarea>
                  </div>
                  <button type="submit" className="btn btn-primary" disabled={feedbackLoading}>
                    {feedbackLoading ? 'Sending...' : 'Send message'}
                  </button>
                </form>
              </div>
            </section>
          </main>

          <footer className="footer">
            <div className="container footer-inner">
              <a href="#" className="logo">
                CampusFit
              </a>
              <div className="footer-links">
                <a href="#">Instagram</a>
                <a href="#">LinkedIn</a>
                <a href="#">Behance</a>
              </div>
              <p className="footer-copy">&copy; CampusFit. All rights reserved.</p>
            </div>
          </footer>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HomePage />);
  </script>
</body>
</html>
