<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusFit |  Training Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const API_PORT = '3000';

    const heroSlides = [
      'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1800&q=80',
      'https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=1800&q=80',
      'https://images.unsplash.com/photo-1593079831268-3381b0db4a77?auto=format&fit=crop&w=1800&q=80',
    ];

    const showcaseImages = [
      {
        src: 'https://images.unsplash.com/photo-1540497077202-7c8a3999166f?auto=format&fit=crop&w=1200&q=80',
        title: 'Strength Floor',
        subtitle: 'Premium free weights and racks',
      },
      {
        src: 'https://images.unsplash.com/photo-1571902943202-507ec2618e8f?auto=format&fit=crop&w=1200&q=80',
        title: 'Functional Arena',
        subtitle: 'Mobility and HIIT-focused training zone',
      },
      {
        src: 'https://images.unsplash.com/photo-1579758629938-03607ccdbaba?auto=format&fit=crop&w=1200&q=80',
        title: 'Recovery Lounge',
        subtitle: 'Stretch, recover, and reset faster',
      },
      {
        src: 'https://images.unsplash.com/photo-1434682881908-b43d0467b798?auto=format&fit=crop&w=1200&q=80',
        title: 'Cardio Studio',
        subtitle: 'High-energy endurance sessions',
      },
    ];

    function getApiUrl(path) {
      const port = window.location.port;
      const isFile = window.location.protocol === 'file:';
      const needRemote = isFile || !port || port !== API_PORT || !window.location.hostname;
      const base = needRemote ? 'http://localhost:' + API_PORT : '';
      return (base + '/api' + path).replace(/([^:]\/)\/+/g, '$1');
    }

    function isLoggedIn() {
      return !!localStorage.getItem('auth_token');
    }

    function MiniLeaderboard() {
      const [entries, setEntries] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');

      useEffect(() => {
        async function load() {
          try {
            const res = await fetch(getApiUrl('/leaderboard-advanced'));
            if (!res.ok) throw new Error('Failed to load leaderboard');
            const data = await res.json();
            if (!data.success) throw new Error(data.message || 'Failed to load leaderboard');
            setEntries((data.data || []).slice(0, 5));
          } catch (err) {
            console.error(err);
            setError('Leaderboard unavailable');
          } finally {
            setLoading(false);
          }
        }
        load();
      }, []);

      return (
        <div className="leaderboard-panel clay-card">
          <div className="panel-head">
            <p className="eyebrow">Community</p>
            <h3>Top Performers</h3>
          </div>
          {loading && <p className="panel-meta">Loading leaderboard...</p>}
          {error && !loading && <p className="panel-meta">{error}</p>}
          {!loading && !error && entries.length > 0 && (
            <div className="leaderboard-list">
              {entries.map((row, idx) => (
                <div className="leaderboard-row" key={row.user_id || idx}>
                  <span className="rank">#{idx + 1}</span>
                  <span className="name">{row.name}</span>
                  <span className="score">{Number(row.total_score || 0).toFixed(0)}</span>
                </div>
              ))}
            </div>
          )}
          <a href="leaderboard.html" className="text-link">Open full leaderboard</a>
        </div>
      );
    }

    function HomePage() {
      const [loggedIn] = useState(isLoggedIn());
      const [menuOpen, setMenuOpen] = useState(false);
      const [headerSolid, setHeaderSolid] = useState(false);
      const [feedbackMessage, setFeedbackMessage] = useState('');
      const [feedbackError, setFeedbackError] = useState(false);
      const [feedbackLoading, setFeedbackLoading] = useState(false);
      const [heroIndex, setHeroIndex] = useState(0);
      const [showcaseIndex, setShowcaseIndex] = useState(0);

      useEffect(() => {
        function onScroll() {
          setHeaderSolid(window.scrollY > 30);
        }
        window.addEventListener('scroll', onScroll);
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      useEffect(() => {
        const timer = setInterval(() => {
          setHeroIndex((prev) => (prev + 1) % heroSlides.length);
        }, 4500);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        const timer = setInterval(() => {
          setShowcaseIndex((prev) => (prev + 1) % showcaseImages.length);
        }, 3500);
        return () => clearInterval(timer);
      }, []);

      function closeMobileMenu() {
        setMenuOpen(false);
        document.body.style.overflow = '';
      }

      async function handleContactSubmit(e) {
        e.preventDefault();
        const form = e.target;
        const name = form.name.value;
        const email = form.email.value;
        const message = form.message.value;

        setFeedbackLoading(true);
        setFeedbackMessage('');
        setFeedbackError(false);

        try {
          const res = await fetch(getApiUrl('/feedback'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, message }),
          });
          const data = await res.json();
          if (data.success) {
            setFeedbackMessage(data.message || "Thanks for your message. We'll reach out shortly.");
            form.reset();
          } else {
            setFeedbackError(true);
            setFeedbackMessage(data.message || 'Failed to send feedback.');
          }
        } catch (err) {
          console.error(err);
          setFeedbackError(true);
          setFeedbackMessage('Network error. Please try again later.');
        } finally {
          setFeedbackLoading(false);
        }
      }

      return (
        <>
          <header className={'header' + (headerSolid ? ' header--solid' : '')}>
            <div className="container header-inner">
              <a href="#" className="logo">CampusFit Elite</a>

              <nav className="nav desktop-nav">
                <a href="#programs">Programs</a>
                <a href="#gallery">Gallery</a>
                <a href="#schedule">Schedule</a>
                <a href="#contact">Contact</a>
                {loggedIn ? (
                  <>
                    <a href="discover.html">Discover</a>
                    <a href="profile.html">Profile</a>
                    <a href="leaderboard.html">Leaderboard</a>
                  </>
                ) : (
                  <>
                    <a href="login.html">Login</a>
                    <a href="signup.html" className="pill-link">Join Now</a>
                  </>
                )}
              </nav>

              <button
                className="menu-btn"
                aria-label="Toggle menu"
                aria-expanded={menuOpen}
                onClick={() => {
                  const next = !menuOpen;
                  setMenuOpen(next);
                  document.body.style.overflow = next ? 'hidden' : '';
                }}
              >
                <span></span>
                <span></span>
                <span></span>
              </button>
            </div>

            <nav className={'nav-mobile' + (menuOpen ? ' is-open' : '')}>
              <a href="#programs" onClick={closeMobileMenu}>Programs</a>
              <a href="#gallery" onClick={closeMobileMenu}>Gallery</a>
              <a href="#schedule" onClick={closeMobileMenu}>Schedule</a>
              <a href="#contact" onClick={closeMobileMenu}>Contact</a>
              {loggedIn ? (
                <>
                  <a href="discover.html" onClick={closeMobileMenu}>Discover</a>
                  <a href="profile.html" onClick={closeMobileMenu}>Profile</a>
                  <a href="leaderboard.html" onClick={closeMobileMenu}>Leaderboard</a>
                </>
              ) : (
                <>
                  <a href="login.html" onClick={closeMobileMenu}>Login</a>
                  <a href="signup.html" onClick={closeMobileMenu}>Signup</a>
                </>
              )}
            </nav>
          </header>

          <main>
            <section className="hero">
              <div className="hero-backdrop">
                {heroSlides.map((slide, index) => (
                  <img
                    key={slide}
                    src={slide}
                    alt=""
                    className={'hero-bg' + (index === heroIndex ? ' is-active' : '')}
                  />
                ))}
              </div>

              <div className="container hero-grid">
                <div className="hero-copy clay-card">
                  <p className="eyebrow">CampusFit Performance Club</p>
                  <h1>Train Smarter. Move Stronger. Look Elite.</h1>
                  <p>
                    A professionally designed university gym experience with guided programs,
                    certified coaching, and measurable weekly progress.
                  </p>
                  <div className="cta-row">
                    <a href="signup.html" className="btn btn-primary">Register Yourself & Train Others to Earn</a>
                    <a href="#schedule" className="btn btn-ghost">View Timings</a>
                  </div>
                  <div className="hero-stats">
                    <div><strong>2.5k+</strong><span>Active members</span></div>
                    <div><strong>35+</strong><span>Weekly classes</span></div>
                    <div><strong>4.9/5</strong><span>Average rating</span></div>
                  </div>
                </div>

                <div className="hero-media-col">
                  <div className="showcase-card clay-card">
                    <img src={showcaseImages[showcaseIndex].src} alt={showcaseImages[showcaseIndex].title} />
                    <div className="showcase-meta">
                      <h3>{showcaseImages[showcaseIndex].title}</h3>
                      <p>{showcaseImages[showcaseIndex].subtitle}</p>
                    </div>
                  </div>
                  <MiniLeaderboard />
                </div>
              </div>
            </section>

            <section id="programs" className="section">
              <div className="container">
                <div className="section-head">
                  <p className="eyebrow">Programs</p>
                  <h2>Personalized training tracks for every goal</h2>
                </div>
                <div className="program-grid">
                  <article className="program-card clay-card">
                    <h3>Strength Builder</h3>
                    <p>Progressive overload plans for muscle and power with coach check-ins.</p>
                    <span>3-5 sessions per week</span>
                  </article>
                  <article className="program-card clay-card">
                    <h3>Fat Loss Accelerator</h3>
                    <p>Cardio + resistance mix designed for sustainable body recomposition.</p>
                    <span>Nutrition support included</span>
                  </article>
                  <article className="program-card clay-card">
                    <h3>Athletic Conditioning</h3>
                    <p>Agility, speed, and mobility modules for sport-focused performance.</p>
                    <span>Coach-led small groups</span>
                  </article>
                </div>
              </div>
            </section>

            <section id="gallery" className="section section-alt">
              <div className="container">
                <div className="section-head">
                  <p className="eyebrow">Facility</p>
                  <h2>Premium spaces built for serious training</h2>
                </div>
                <div className="gallery-grid">
                  {showcaseImages.map((item) => (
                    <article className="gallery-item clay-card" key={item.title}>
                      <img src={item.src} alt={item.title} />
                      <div>
                        <h3>{item.title}</h3>
                        <p>{item.subtitle}</p>
                      </div>
                    </article>
                  ))}
                </div>
              </div>
            </section>

            <section id="schedule" className="section">
              <div className="container schedule-wrap clay-card">
                <div>
                  <p className="eyebrow">Schedule</p>
                  <h2>Open daily with structured slots</h2>
                  <p>Book sessions in advance and avoid crowded hours. Our timetable is designed for consistency.</p>
                </div>
                <div className="schedule-grid">
                  <div><h4>Mon - Fri</h4><p>6:00 AM - 10:00 PM</p></div>
                  <div><h4>Saturday</h4><p>7:00 AM - 9:00 PM</p></div>
                  <div><h4>Sunday</h4><p>8:00 AM - 8:00 PM</p></div>
                  <div><h4>Coach Hours</h4><p>5:00 PM - 9:00 PM</p></div>
                </div>
              </div>
            </section>

            <section id="contact" className="section section-alt">
              <div className="container contact-grid">
                <div className="contact-info">
                  <p className="eyebrow">Contact</p>
                  <h2>Build your next fitness chapter with CampusFit</h2>
                  <p>Share your goal and we will suggest your best starter plan within 24 hours.</p>
                </div>
                <form className="contact-form clay-card" onSubmit={handleContactSubmit}>
                  {feedbackMessage && (
                    <p className={'form-feedback' + (feedbackError ? ' is-error' : ' is-success')}>
                      {feedbackMessage}
                    </p>
                  )}
                  <div className="form-row">
                    <label htmlFor="name">Name</label>
                    <input id="name" name="name" type="text" placeholder="Your full name" required />
                  </div>
                  <div className="form-row">
                    <label htmlFor="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="you@example.com" required />
                  </div>
                  <div className="form-row">
                    <label htmlFor="message">Goal</label>
                    <textarea id="message" name="message" rows="4" placeholder="Tell us your fitness goal" required></textarea>
                  </div>
                  <button className="btn btn-primary" type="submit" disabled={feedbackLoading}>
                    {feedbackLoading ? 'Sending...' : 'Send Enquiry'}
                  </button>
                </form>
              </div>
            </section>
          </main>

          <footer className="footer">
            <div className="container footer-inner">
              <a href="#" className="logo">CampusFit Elite</a>
              <p>Professional training environment for students and athletes.</p>
              <div className="footer-links">
                <a href="#programs">Programs</a>
                <a href="#gallery">Gallery</a>
                <a href="#contact">Contact</a>
              </div>
            </div>
          </footer>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HomePage />);
  </script>
</body>
</html>
