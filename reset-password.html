<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password – Bennett University</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const API_PORT = '3000';

    function getApiUrl(path) {
      const port = window.location.port;
      const isFile = window.location.protocol === 'file:';
      const needRemote = isFile || !port || port !== API_PORT || !window.location.hostname;
      const base = needRemote ? 'http://localhost:' + API_PORT : '';
      return (base + '/api' + path).replace(/([^:]\/)\/+/g, '$1');
    }

    function ResetPasswordPage() {
      const [token, setToken] = useState('');
      const [password, setPassword] = useState('');
      const [confirm, setConfirm] = useState('');
      const [message, setMessage] = useState('');
      const [isError, setIsError] = useState(false);
      const [subtitle, setSubtitle] = useState('Enter your new password below.');
      const [disabled, setDisabled] = useState(false);
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const t = params.get('token');
        if (t) {
          setToken(t);
        } else {
          setDisabled(true);
          setSubtitle(
            'Invalid or missing reset link. Please request a new one from the forgot password page.'
          );
        }
      }, []);

      async function handleSubmit(e) {
        e.preventDefault();
        if (!token) {
          setMessage('Invalid reset link. Please request a new one.');
          setIsError(true);
          return;
        }
        if (!password || password.length < 6) {
          setMessage('Password must be at least 6 characters.');
          setIsError(true);
          return;
        }
        if (password !== confirm) {
          setMessage('Passwords do not match');
          setIsError(true);
          return;
        }

        setLoading(true);
        setMessage('');
        setIsError(false);

        try {
          const res = await fetch(getApiUrl('/reset-password'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password }),
          });
          const data = await res.json();
          if (data.success) {
            setMessage(data.message || 'Password reset successful. Redirecting to login...');
            setIsError(false);
            setTimeout(() => {
              window.location.href = 'login.html';
            }, 1200);
          } else {
            setMessage(data.message || 'Reset failed');
            setIsError(true);
            setLoading(false);
          }
        } catch (err) {
          console.error(err);
          setMessage('Network error. Make sure the server is running (npm start).');
          setIsError(true);
          setLoading(false);
        }
      }

      return (
        <>
          <a href="index.html" className="auth-back">
            &larr; Back to home
          </a>

          <div className="auth-wrap">
            {message && (
              <p
                className={
                  'auth-message' + (isError ? ' auth-message--error' : ' auth-message--success')
                }
              >
                {message}
              </p>
            )}

            <div className="auth-badge">Set new password</div>
            <h1 className="auth-title">Create new password</h1>
            <p className="auth-subtitle">{subtitle}</p>

            <div className="auth-card">
              <form className="auth-form" onSubmit={handleSubmit}>
                <input type="hidden" name="token" value={token} />
                <div className="form-row">
                  <label htmlFor="reset-password">New password</label>
                  <input
                    type="password"
                    id="reset-password"
                    name="password"
                    required
                    minLength={6}
                    placeholder="••••••••"
                    value={password}
                    onChange={(e) => setPassword(e.target.value)}
                    disabled={disabled}
                  />
                </div>
                <div className="form-row">
                  <label htmlFor="reset-confirm">Confirm password</label>
                  <input
                    type="password"
                    id="reset-confirm"
                    name="confirm"
                    required
                    minLength={6}
                    placeholder="••••••••"
                    value={confirm}
                    onChange={(e) => setConfirm(e.target.value)}
                    disabled={disabled}
                  />
                </div>
                <button
                  type="submit"
                  className="auth-btn-primary"
                  disabled={disabled || loading}
                >
                  {loading ? 'Please wait...' : 'Reset password'}
                </button>
              </form>
            </div>

            <p className="auth-switch">
              <a href="login.html">&larr; Back to login</a>
            </p>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ResetPasswordPage />);
  </script>
</body>
</html>
